<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Complete</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --border: rgba(255,255,255,0.07);
    --accent: #7864ff; --accent2: #a78bfa; --text: #f0eeff;
    --muted: rgba(240,238,255,0.4); --success: #34d399;
    --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 60% 60% at 50% 40%, rgba(52,211,153,0.06) 0%, transparent 70%);
  }
  .panel {
    width: 100%; max-width: 420px; text-align: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 3rem 2rem;
    animation: fadeUp 0.5s ease forwards;
  }
  .icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.25);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
  }
  .icon svg { color: var(--success); }
  h1 { font-size: 22px; font-weight: 400; margin-bottom: 0.75rem; }
  p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 2rem; }
  a {
    display: inline-block; background: var(--accent); color: #fff;
    text-decoration: none; border-radius: 10px; padding: 12px 28px;
    font-size: 14px; font-weight: 500; transition: opacity 0.2s;
  }
  a:hover { opacity: 0.85; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div class="panel">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>
    <h1>Payment submitted</h1>
    <p>Your bank verification was completed successfully.<br>You will receive a confirmation email shortly.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
